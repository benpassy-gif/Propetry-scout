name: Property Scout

on:
  schedule:
    # 07:00 Israel summer time (UTC+3) = 04:00 UTC
    - cron: "0 4 * * 0-5"
    # 19:00 Israel summer time (UTC+3) = 16:00 UTC
    - cron: "0 16 * * 0-5"
  workflow_dispatch:
    inputs:
      profile_id:
        description: "Profile ID to run (leave empty for all active)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scraper/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROFILE_ID: ${{ github.event.inputs.profile_id }}
        run: python scraper/scout.py
        timeout-minutes: 15

      - name: Commit results back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scraper/results.json scraper/profiles.json scraper/seen_listings.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update results [skip ci]"
            git push
          fi
